<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Canal Premium</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

header {
  background: black;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: red;
}

.search {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.section {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap: 10px;
}

.card {
  position: relative;
  cursor: pointer;
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 6px;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(transparent, black);
  padding: 5px;
  font-size: 12px;
}

.social {
  padding: 20px;
  text-align: center;
}

.social a {
  margin: 10px;
  color: white;
  text-decoration: none;
  font-size: 18px;
}

</style>
</head>

<body>

<header>
  <div class="logo">🔥 Mi Canal</div>
  <input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
</header>

<div class="section">
  <h2>🆕 Últimos</h2>
  <div id="ultimos" class="grid"></div>
</div>

<div class="section">
  <h2>🎯 Recomendado</h2>
  <div id="random" class="grid"></div>
</div>

<div class="section">
  <h2>📁 Todo el contenido</h2>
  <div id="contenido" class="grid"></div>
</div>

<div class="social">
  <h3>Sígueme</h3>
  <a href="https://t.me/TUCANAL" target="_blank">Telegram</a>
  <a href="#">Twitter</a>
  <a href="#">Instagram</a>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzoqrBSteUmKkx-qFvPb1FEgI6Ex_0dKbkoXIVMmmbO4t1qlbbOSZXf3UgixwdBH1by/exec";

async function cargarDatos() {
  const res = await fetch(API_URL);
  const data = await res.json();

  iniciar(data);
}

function iniciar(data) {

  // ordenar por fecha real
  const ultimos = [...data].sort((a, b) =>
    new Date(b.published_at) - new Date(a.published_at)
  );

  // recomendados random
  const random = [...data].sort(() => 0.5 - Math.random());

  render(ultimos, "ultimos");
  render(random, "random");
  render(data, "contenido");

  window.dataGlobal = data;
}

function render(lista, id) {
  const contenedor = document.getElementById(id);
  contenedor.innerHTML = "";

  lista.forEach(item => {

    const titulo = item.title || "Sin título";
    const img = item.poster || "https://via.placeholder.com/300x450";

    let accion = "";
    let texto = titulo;

    if (item.vip_post && item.vip_post.trim() !== "") {
      accion = `window.open('${item.vip_post}','_blank')`;
    } else {
      accion = `window.open('https://t.me/movfrezon','_blank')`;
      texto = "Contactar con admin";
    }

    contenedor.innerHTML += `
      <div class="card" onclick="${accion}">
        <img src="${img}" loading="lazy">
        <div class="overlay">${texto}</div>
      </div>
    `;
  });
}

function buscar(texto) {
  const filtrado = window.dataGlobal.filter(x =>
    (x.title || "").toLowerCase().includes(texto.toLowerCase())
  );
  render(filtrado, "contenido");
}

cargarDatos();

</script>
