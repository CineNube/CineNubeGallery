<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Canal Premium</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

header {
  background: black;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: red;
}

.search {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.section {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap: 10px;
}

.card {
  position: relative;
  cursor: pointer;
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 6px;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(transparent, black);
  padding: 5px;
  font-size: 12px;
}

.social {
  padding: 20px;
  text-align: center;
}

.social a {
  margin: 10px;
  color: white;
  text-decoration: none;
  font-size: 18px;
}

</style>
</head>

<body>

<header>
  <div class="logo">🔥 Mi Canal</div>
  <input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
</header>

<div class="section">
  <h2>🆕 Últimos</h2>
  <div id="ultimos" class="grid"></div>
</div>

<div class="section">
  <h2>🎯 Recomendado</h2>
  <div id="random" class="grid"></div>
</div>

<div class="section">
  <h2>📁 Todo el contenido</h2>
  <div id="contenido" class="grid"></div>
</div>

<div class="social">
  <h3>Sígueme</h3>
  <a href="https://t.me/TUCANAL" target="_blank">Telegram</a>
  <a href="#">Twitter</a>
  <a href="#">Instagram</a>
</div>

<script>

// 🔥 AQUÍ AÑADES TU CONTENIDO
const data = [
  {
    titulo: "Video 1",
    img: "https://via.placeholder.com/300x450",
    link: "https://t.me/tu_post"
  },
  {
    titulo: "Video 2",
    img: "https://via.placeholder.com/300x450",
    link: "https://t.me/tu_post"
  }
];

// ordenar últimos (simula nuevo primero)
const ultimos = [...data].reverse();

// random
const random = [...data].sort(() => 0.5 - Math.random());

function render(lista, id) {
  const contenedor = document.getElementById(id);
  contenedor.innerHTML = "";

  lista.forEach(item => {
    contenedor.innerHTML += `
      <div class="card" onclick="window.open('${item.link}','_blank')">
        <img src="${item.img}" loading="lazy">
        <div class="overlay">${item.titulo}</div>
      </div>
    `;
  });
}

function buscar(texto) {
  const filtrado = data.filter(x =>
    x.titulo.toLowerCase().includes(texto.toLowerCase())
  );
  render(filtrado, "contenido");
}

// render inicial
render(ultimos, "ultimos");
render(random, "random");
render(data, "contenido");

</script>

</body>
</html>
