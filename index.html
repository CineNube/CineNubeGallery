<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Canal Premium</title>

<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:white;}
header {background:black;padding:15px;display:flex;justify-content:space-between;align-items:center;}
.logo {font-size:22px;font-weight:bold;color:red;cursor:pointer;}
.search {padding:8px;border-radius:5px;border:none;width:150px;}

.section {padding:20px;}
.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}

.card {position:relative;cursor:pointer;overflow:hidden;border-radius:10px;transition:.3s;}
.card:hover {transform:scale(1.08);}
.card img {width:100%;border-radius:10px;}

.overlay {
position:absolute;bottom:0;width:100%;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
padding:10px;font-size:12px;text-align:center;
}

.btn-ver {
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
background:red;padding:6px 12px;
font-weight:bold;border-radius:6px;
}

.badge {
position:absolute;top:10px;left:10px;
background:green;padding:3px 6px;
font-size:12px;border-radius:5px;
font-weight:bold;
}
.badge.pago {background:red;}

.extraTag{
position:absolute;bottom:10px;left:10px;
background:black;padding:3px 6px;
font-size:11px;border-radius:5px;
opacity:0.8;
}

.vipGlow {box-shadow:0 0 12px rgba(255,0,0,0.7);}
</style>
</head>

<body>

<header>
<div class="logo" onclick="resetBusqueda()">🔥 Mi Canal</div>
<input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
</header>

<div class="section">
<p style="opacity:0.7;font-size:14px;">
🔥 Nuevo contenido cada día — algunos títulos requieren acceso VIP
</p>
</div>

<div class="section"><h2>🚀 Hoy</h2><div id="hoy" class="grid"></div></div>
<div class="section"><h2>🔥 Lo más visto</h2><div id="trending" class="grid"></div></div>
<div class="section"><h2>💎 Solo VIP</h2><div id="topventas" class="grid"></div></div>
<div class="section"><h2>⭐ Top calidad</h2><div id="destacadas" class="grid"></div></div>
<div class="section"><h2>🎬 Películas</h2><div id="peliculas" class="grid"></div></div>
<div class="section"><h2>📺 Series</h2><div id="series" class="grid"></div></div>

<div class="section"><h2>🔥 Usuarios viendo ahora</h2><div id="viendo" class="grid"></div></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxWfCboKOh6Gez4dDbP0BG7Wq8AZEV5fO3-YR3wUOrCNU-0ETH31DMM8D9_2KVVgIUb/exec?nocache="+Date.now();

let dataGlobal=[];

function getClicks(){
return JSON.parse(localStorage.getItem("clicks")||"{}");
}

function addClick(title){
let clicks=getClicks();
clicks[title]=(clicks[title]||0)+1;
localStorage.setItem("clicks",JSON.stringify(clicks));
}

function abrirContenido(link,tipo,precio,pop,title){

addClick(title);

if(tipo!=="gratis"){
let mensaje="🔒 CONTENIDO VIP\n\n";
if(pop>150) mensaje+="🔥 MUY DEMANDADO\n";
if(precio<=10) mensaje+="💸 PRECIO BAJO\n";
else if(precio<=25) mensaje+="⭐ RECOMENDADO\n";
else mensaje+="💎 PREMIUM\n";
mensaje+="\n⚡ Acceso en Telegram";
if(!confirm(mensaje)) return;
}
if(!link) return window.open("https://t.me/estrenos_online_25","_blank");
window.open(link,"_blank");
}

async function cargarDatos(){
let res=await fetch(API_URL);
dataGlobal=Object.values((await res.json()).reduce((acc,item)=>{
acc[item.title]=item;return acc;
},{}));
iniciar();
setInterval(iniciar,300000);
}

function tagExtra(item){
if(item.vote_average>=8) return "🔥 TOP";
if(item.popularity>200) return "💥 VIRAL";
if(item.tipo_contenido!=="gratis") return "💎 VIP";
return "🆕 NUEVO";
}

function render(lista,id){
let grid=document.getElementById(id);
grid.innerHTML="";

lista.slice(0,20).forEach(item=>{
let div=document.createElement("div");
div.className="card "+(item.tipo_contenido!=="gratis"?"vipGlow":"");

div.onclick=()=>abrirContenido(item.vip_post,item.tipo_contenido,item.precio_stars,item.popularity,item.title);

div.innerHTML=`
<img src="${item.poster||''}">
<div class="btn-ver">VER</div>
<div class="overlay">${item.title}</div>
<div class="badge ${item.tipo_contenido==='gratis'?'':'pago'}">
${item.tipo_contenido==='gratis'?'Gratis':'🔒 VIP · '+item.precio_stars+'⭐'}
</div>
<div class="extraTag">${tagExtra(item)}</div>
`;

grid.appendChild(div);
});
}

function iniciar(){

let clicks=getClicks();

let trending=[...dataGlobal].sort((a,b)=>(b.popularity||0)-(a.popularity||0));
let vip=[...dataGlobal].filter(x=>x.tipo_contenido!=="gratis");
let destacadas=dataGlobal.filter(x=>x.vote_average>=7.5);
let pelis=dataGlobal.filter(x=>x.type==="movie");
let series=dataGlobal.filter(x=>x.type && x.type.toLowerCase()==="tv");

// 🔥 basado en clics reales
let viendo=[...dataGlobal].sort((a,b)=>(clicks[b.title]||0)-(clicks[a.title]||0));

render(trending,"trending");
render(vip,"topventas");
render(destacadas,"destacadas");
render(pelis,"peliculas");
render(series,"series");
render(viendo,"viendo");

// HOY simple
render([...dataGlobal].sort((a,b)=> new Date(b.published_at)-new Date(a.published_at)),"hoy");
}

function buscar(txt){
let f=dataGlobal.filter(x=>x.title.toLowerCase().includes(txt.toLowerCase()));
render(f,"trending");
render(f,"peliculas");
render(f,"series");
}

function resetBusqueda(){
document.querySelector(".search").value="";
iniciar();
}

cargarDatos();
</script>
</body>
</html>
