<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackScreenCine</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:white;}

header {
background:black;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo {font-size:20px;font-weight:bold;color:red;cursor:pointer;}
.search {padding:8px;border-radius:20px;border:none;width:140px;background:#1a1a1a;color:white;}

/* MENU */
.menu {display:flex;gap:8px;padding:10px;overflow-x:auto;background:#111;}
.menu button {background:#1a1a1a;color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;}
.menu button.active {background:red;}

/* HERO */
.hero {position:relative;height:220px;background:#000;display:flex;align-items:flex-end;padding:20px;}
.hero img {position:absolute;width:100%;height:100%;object-fit:cover;top:0;left:0;opacity:0.4;}
.hero h1 {z-index:2;margin:0;font-size:20px;}
.hero button {z-index:2;margin-top:10px;background:red;border:none;padding:8px 14px;border-radius:6px;color:white;}

.section {padding:10px;}

/* CAROUSEL */
.row {display:flex;overflow-x:auto;gap:10px;padding:10px 0;}
.card {min-width:140px;position:relative;border-radius:10px;overflow:hidden;cursor:pointer;transition:.3s;}
.card:hover {transform:scale(1.05);} 
.card img {width:100%;}

.badge {position:absolute;top:6px;left:6px;background:green;padding:2px 6px;font-size:10px;border-radius:4px;}
.badge.pago {background:red;}

</style>
</head>

<body>

<header>
<div class="logo" onclick="resetBusqueda()">🔥 CineNube</div>
<input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
</header>

<div class="menu">
<button onclick="mostrar('home')" class="active">Inicio</button>
<button onclick="mostrar('peliculas')">Películas</button>
<button onclick="mostrar('series')">Series</button>
<button onclick="toggleFiltro('gratis')">Gratis</button>
<button onclick="toggleFiltro('vip')">VIP</button>
</div>

<!-- HERO -->
<div class="hero" id="hero">
<img id="heroImg">
<div>
<h1 id="heroTitle"></h1>
<button onclick="playHero()">▶ Ver ahora</button>
</div>
</div>

<div id="home" class="section"></div>
<div id="peliculas" class="section"></div>
<div id="series" class="section"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxWfCboKOh6Gez4dDbP0BG7Wq8AZEV5fO3-YR3wUOrCNU-0ETH31DMM8D9_2KVVgIUb/exec?nocache="+Date.now();

let dataGlobal=[];
let filtroActual=null;
let heroItem=null;

function mostrar(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
Array.from(document.querySelectorAll(".menu button")).forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

function toggleFiltro(tipo){
filtroActual = (filtroActual===tipo?null:tipo);
iniciar();
}

function abrirContenido(link,tipo,precio,pop,title){
if(tipo!=="gratis"){
if(!confirm("🔒 Contenido VIP\nAccede desde Telegram")) return;
}
window.open(link||"https://t.me/estrenos_online_25","_blank");
}

async function cargarDatos(){
let res=await fetch(API_URL);
dataGlobal=Object.values((await res.json()).reduce((acc,item)=>{
acc[item.title]=item;return acc;
},{}));
iniciar();
}

function renderRow(lista,titulo,containerId){
let cont=document.getElementById(containerId);
let html=`<h3>${titulo}</h3><div class="row">`;

lista.forEach(item=>{
html+=`
<div class="card" onclick="abrirContenido('${item.vip_post}','${item.tipo_contenido}',${item.precio_stars},${item.popularity},'${item.title}')">
<img src="${item.poster}">
<div class="badge ${item.tipo_contenido==='gratis'?'':'pago'}">
${item.tipo_contenido==='gratis'?'Gratis':'VIP'}
</div>
</div>`;
});

html+="</div>";
cont.innerHTML+=html;
}

function aplicarFiltro(lista){
if(!filtroActual) return lista;
return lista.filter(x=> filtroActual==='gratis' ? x.tipo_contenido==='gratis' : x.tipo_contenido!=='gratis');
}

function iniciar(){
let pelis=dataGlobal.filter(x=>x.type==="movie");
let series=dataGlobal.filter(x=>x.type && x.type.toLowerCase()==="tv");
let trending=[...dataGlobal].sort((a,b)=>(b.popularity||0)-(a.popularity||0));

pelis=aplicarFiltro(pelis);
series=aplicarFiltro(series);
trending=aplicarFiltro(trending);

// HERO
heroItem=trending[0];
if(heroItem){
document.getElementById("heroImg").src=heroItem.poster;
document.getElementById("heroTitle").innerText=heroItem.title;
}

// HOME
let home=document.getElementById("home");
home.innerHTML="";
renderRow(trending.slice(0,10),"🔥 Popular","home");
renderRow(pelis.slice(0,10),"🎬 Películas","home");
renderRow(series.slice(0,10),"📺 Series","home");

// PELIS
let pelisDiv=document.getElementById("peliculas");
pelisDiv.innerHTML="";
renderRow(pelis,"Películas","peliculas");

// SERIES
let seriesDiv=document.getElementById("series");
seriesDiv.innerHTML="";
renderRow(series,"Series","series");
}

function playHero(){
if(heroItem) abrirContenido(heroItem.vip_post,heroItem.tipo_contenido,heroItem.precio_stars,heroItem.popularity,heroItem.title);
}

function buscar(txt){
let f=dataGlobal.filter(x=>x.title.toLowerCase().includes(txt.toLowerCase()));
document.getElementById("home").innerHTML="";
renderRow(f,"Resultados","home");
}

function resetBusqueda(){
document.querySelector(".search").value="";
iniciar();
}

// PWA SW
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

cargarDatos();
</script>

</body>
</html>
