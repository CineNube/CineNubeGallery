<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Canal Premium</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

header {
  background: black;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: red;
}

.search {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.section {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap: 12px;
}

.card {
  position: relative;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.06);
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(transparent, black);
  padding: 8px;
  font-size: 12px;
}

.btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  padding: 5px 8px;
  font-size: 10px;
  border-radius: 5px;
}

.social {
  padding: 20px;
  text-align: center;
}

.social a {
  margin: 10px;
  color: white;
  text-decoration: none;
  font-size: 18px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🔥 Mi Canal</div>
  <input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
</header>

<div class="section">
  <h2>🚀 Hoy</h2>
  <div id="hoy" class="grid"></div>
</div>

<div class="section">
  <h2>⭐ Destacadas</h2>
  <div id="destacadas" class="grid"></div>
</div>

<div class="section">
  <h2>🎬 Películas</h2>
  <div id="peliculas" class="grid"></div>
</div>

<div class="section">
  <h2>📺 Series</h2>
  <div id="series" class="grid"></div>
</div>

<div class="section">
  <h2>🔥 Recomendado</h2>
  <div id="random" class="grid"></div>
</div>

<div class="section">
  <h2>📁 Todo</h2>
  <div id="contenido" class="grid"></div>
</div>

<div class="social">
  <h3>Sígueme</h3>
  <a href="https://t.me/estrenos_online_25" target="_blank">Telegram</a>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxWfCboKOh6Gez4dDbP0BG7Wq8AZEV5fO3-YR3wUOrCNU-0ETH31DMM8D9_2KVVgIUb/exec";

async function cargarDatos() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    iniciar(data);
  } catch (error) {
    document.body.innerHTML = "<h2 style='text-align:center'>Error cargando contenido</h2>";
  }
}

function iniciar(data) {

  const hoyStr = new Date().toISOString().split("T")[0];

  const hoy = data.filter(x => (x.published_at || "").startsWith(hoyStr));

  const destacadas = data.filter(x => (x.destacada || "").toLowerCase() === "si").slice(0,20);

  const peliculas = data.filter(x => x.type === "movie").slice(0,40);

  const series = data.filter(x => x.type === "tv").slice(0,40);

  const random = [...data].sort(() => 0.5 - Math.random()).slice(0,30);

  const contenido = data.slice(0,80);

  render(hoy, "hoy");
  render(destacadas, "destacadas");
  render(peliculas, "peliculas");
  render(series, "series");
  render(random, "random");
  render(contenido, "contenido");

  window.dataGlobal = data;
}

function abrirContenido(link) {
  if (!link) {
    window.open("https://t.me/estrenos_online_25", "_blank");
    return;
  }

  const match = link.match(/\/(\d+)$/);
  if (match) {
    const postId = match[1];

    // intento app Telegram
    window.location.href = `tg://resolve?domain=estrenos_online_25&post=${postId}`;

    // fallback web
    setTimeout(() => {
      window.open(`https://t.me/estrenos_online_25/${postId}`, "_blank");
    }, 800);

  } else {
    window.open(link, "_blank");
  }
}

function render(lista, id) {
  const contenedor = document.getElementById(id);
  contenedor.innerHTML = "";

  lista.forEach(item => {
    const titulo = item.title || "Sin título";
    const img = item.poster || "https://via.placeholder.com/300x450";
    const link = item.vip_post || "";

    contenedor.innerHTML += `
      <div class="card" onclick="abrirContenido('${link}')">
        <img src="${img}" loading="lazy">
        <div class="btn">VER</div>
        <div class="overlay">${titulo}</div>
      </div>
    `;
  });
}

function buscar(texto) {
  const filtrado = window.dataGlobal
    .filter(x => (x.title || "").toLowerCase().includes(texto.toLowerCase()))
    .slice(0,50);

  render(filtrado, "contenido");
}

cargarDatos();
</script>

</body>
</html>
