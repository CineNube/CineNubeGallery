<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackScreenCine</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:white;}
header {background:black;padding:12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;}
.logo {font-size:20px;font-weight:bold;color:red;cursor:pointer;}
.search {padding:8px;border-radius:20px;border:none;width:140px;background:#1a1a1a;color:white;}
.menu {display:flex;gap:8px;padding:10px;overflow-x:auto;background:#111;}
.menu button {background:#1a1a1a;color:white;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;}
.menu button.active {background:red;}
.hero {position:relative;height:280px;background:#000;display:flex;align-items:flex-end;padding:20px;overflow:hidden;}
.hero img, .hero video {position:absolute;width:100%;height:100%;object-fit:cover;top:0;left:0;}
.hero video {display:none;}
.hero .overlay {position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);}
.hero h1 {z-index:2;margin:0;font-size:24px;}
.hero button {z-index:2;margin-top:10px;background:red;border:none;padding:8px 14px;border-radius:6px;color:white;cursor:pointer;}
.section {padding:10px;}
.row {display:flex;overflow-x:auto;gap:10px;padding:10px 0;}
.card {min-width:140px;position:relative;border-radius:10px;overflow:hidden;cursor:pointer;}
.card img, .card video {width:100%;}
.badge {position:absolute;top:6px;left:6px;background:green;padding:2px 6px;font-size:10px;border-radius:4px;}
.badge.pago {background:red;}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}
.modal-content{
background:#1a1a1a;
padding:20px;
border-radius:10px;
text-align:center;
}
.modal-content button{
display:block;
margin:8px auto;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
width:200px;
}
.btn-ver{background:red;color:white;}
.btn-contacto{background:#333;color:white;}
.btn-pedir{background:#555;color:white;}
.btn-cerrar{background:#111;color:#aaa;}
</style>
</head>

<body>

<header>
<div class="logo" onclick="resetBusqueda()">🔥 BlackScreenCine</div>
<input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
</header>

<div class="menu">
<button onclick="mostrar('home')" class="active">Inicio</button>
<button onclick="mostrar('peliculas')">Películas</button>
<button onclick="mostrar('series')">Series</button>
<button onclick="toggleFiltro('gratis')">Gratis</button>
<button onclick="toggleFiltro('vip')">VIP</button>
</div>

<div class="hero">
<img id="heroImg">
<video id="heroVideo" muted autoplay loop></video>
<div class="overlay"></div>
<div>
<h1 id="heroTitle"></h1>
<button onclick="playHero()">▶ Ver ahora</button>
</div>
</div>

<div id="home" class="section"></div>
<div id="peliculas" class="section"></div>
<div id="series" class="section"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<h3 id="modalTitle"></h3>
<p>🚧 Este contenido aún no está disponible</p>

<button class="btn-ver"
onclick="window.open('https://t.me/estrenos_online_25/11478','_blank')">
🎬 Ver contenido
</button>

<button class="btn-contacto"
onclick="window.open('https://t.me/share/url?url=&text=Hola,%20quiero%20información','_blank')">
👤 Contactar admin
</button>

<button class="btn-pedir" onclick="pedirPeli()">🎥 Pedir película</button>

<button class="btn-cerrar" onclick="cerrarModal()">Cerrar</button>
</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxWfCboKOh6Gez4dDbP0BG7Wq8AZEV5fO3-YR3wUOrCNU-0ETH31DMM8D9_2KVVgIUb/exec?nocache="+Date.now();

let dataGlobal=[];
let filtroActual=null;
let heroItem=null;

/* STORAGE */
function getFavoritos(){return JSON.parse(localStorage.getItem("favoritos")||"[]");}
function setFavoritos(a){localStorage.setItem("favoritos",JSON.stringify(a));}

function toggleFavorito(item){
let f=getFavoritos();
f=f.find(x=>x.title===item.title)
?f.filter(x=>x.title!==item.title)
:[...f,item];
setFavoritos(f);
iniciar();
}

function guardarVisto(item){
let v=JSON.parse(localStorage.getItem("vistos")||"[]");
v=v.filter(x=>x.title!==item.title);
v.unshift(item);
if(v.length>10)v.pop();
localStorage.setItem("vistos",JSON.stringify(v));
}

function guardarInteres(item){
let i=JSON.parse(localStorage.getItem("intereses")||"{}");
(item.genres||[]).forEach(g=>i[g]=(i[g]||0)+1);
localStorage.setItem("intereses",JSON.stringify(i));
}

/* MODAL */
function abrirModal(t){
document.getElementById("modalTitle").innerText=t;
document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
document.getElementById("modal").style.display="none";
}

/* CONTENIDO */
function abrirContenido(link,tipo,precio,pop,title){

let item=dataGlobal.find(x=>x.title===title);
if(item){guardarVisto(item);guardarInteres(item);}

if(!link){
abrirModal(title);
return;
}

if(tipo!=="gratis"){
let m=`🔒 ${title}\n💎 ${precio||0}⭐`;
if(!confirm(m))return;
}

window.open(link,"_blank");
}

/* PEDIR PELI */
function pedirPeli(){
let t=document.getElementById("modalTitle").innerText;

let url="https://t.me/share/url?url=&text="+
encodeURIComponent("🎬 Quiero esta película: "+t);

window.open(url,"_blank");
}

/* RENDER */
function renderRow(lista,titulo,id){
let c=document.getElementById(id);
let h=`<h3>${titulo}</h3><div class="row">`;

lista.forEach(item=>{
h+=`
<div class="card">
<div onclick="abrirContenido('${item.vip_post}','${item.tipo_contenido}',${item.precio_stars},${item.popularity},'${item.title}')">
<img src="${item.poster}">
</div>

<div onclick='toggleFavorito(${JSON.stringify(item)})'
style="position:absolute;top:6px;right:6px;cursor:pointer;">
⭐
</div>
</div>`;
});

h+="</div>";
c.innerHTML+=h;
}

/* FILTRO */
function aplicarFiltro(l){
if(!filtroActual)return l;
return l.filter(x=>filtroActual==="gratis"?x.tipo_contenido==="gratis":x.tipo_contenido!=="gratis");
}

/* RECOMENDADO */
function getRecomendados(){
let i=JSON.parse(localStorage.getItem("intereses")||"{}");

return [...dataGlobal]
.map(x=>{
let s=0;
(x.genres||[]).forEach(g=>s+=(i[g]||0));
return {...x,score:s};
})
.sort((a,b)=>b.score-a.score)
.slice(0,10);
}

/* INICIAR */
function iniciar(){

let pelis=aplicarFiltro(dataGlobal.filter(x=>x.type==="movie"));
let series=aplicarFiltro(dataGlobal.filter(x=>x.type==="tv"));
let trending=[...dataGlobal].sort((a,b)=>b.popularity-a.popularity);

let home=document.getElementById("home");
home.innerHTML="";

renderRow(getRecomendados(),"🧠 Recomendado para ti","home");
renderRow(JSON.parse(localStorage.getItem("vistos")||"[]"),"▶ Seguir viendo","home");
renderRow(getFavoritos(),"⭐ Favoritos","home");
renderRow(trending.slice(0,10),"🔥 Popular","home");
renderRow(pelis.slice(0,10),"🎬 Películas Destacadas","home");
renderRow(series.slice(0,10),"📺 Series Destacadas","home");

document.getElementById("peliculas").innerHTML="";
renderRow(pelis,"🎬 Todas las Películas","peliculas");

document.getElementById("series").innerHTML="";
renderRow(series,"📺 Todas las Series","series");
}

/* UI */
function mostrar(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function toggleFiltro(t){
filtroActual=filtroActual===t?null:t;
iniciar();
}

function buscar(t){
let f=dataGlobal.filter(x=>x.title.toLowerCase().includes(t.toLowerCase()));
document.getElementById("home").innerHTML="";
renderRow(f,"Resultados","home");
}

function resetBusqueda(){
document.querySelector(".search").value="";
iniciar();
}

async function cargarDatos(){
let r=await fetch(API_URL);
dataGlobal=await r.json();
iniciar();
}

cargarDatos();

</script>

</body>
</html>
