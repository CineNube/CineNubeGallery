<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Canal Premium</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}
header {
  background: black;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.logo {
  font-size: 22px;
  font-weight: bold;
  color: red;
}
.search {
  padding: 8px;
  border-radius: 5px;
  border: none;
  width: 150px;
}
.section {
  padding: 20px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap: 12px;
}
.card {
  position: relative;
  cursor: pointer;
  overflow: hidden;
  border-radius: 10px;
  transition: 0.3s;
}
.card:hover {
  transform: scale(1.06);
}
.card img {
  width: 100%;
  display: block;
  border-radius: 10px;
}
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  padding: 10px;
  font-size: 12px;
  color: white;
  text-align: center;
}
.btn-ver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: red;
  padding: 6px 12px;
  font-weight: bold;
  border-radius: 6px;
  font-size: 14px;
  color: white;
  text-align: center;
  pointer-events: none;
}
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: green;
  padding: 3px 6px;
  font-size: 12px;
  border-radius: 5px;
  font-weight: bold;
  color: white;
}
.badge.pago { background: red; }
.social {
  padding: 20px;
  text-align: center;
}
.social a {
  margin: 10px;
  color: white;
  text-decoration: none;
  font-size: 18px;
}
</style>
</head>

<body>
<header>
  <div class="logo">🔥 Mi Canal</div>
  <input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
</header>

<div class="section">
  <h2>🚀 Hoy</h2>
  <div id="hoy" class="grid" data-index="0"></div>
</div>

<div class="section">
  <h2>⭐ Destacadas</h2>
  <div id="destacadas" class="grid" data-index="0"></div>
</div>

<div class="section">
  <h2>🎬 Películas</h2>
  <div id="peliculas" class="grid" data-index="0"></div>
</div>

<div class="section">
  <h2>📺 Series</h2>
  <div id="series" class="grid" data-index="0"></div>
</div>

<div class="section">
  <h2>🔥 Recomendado</h2>
  <div id="random" class="grid" data-index="0"></div>
</div>

<div class="section">
  <h2>📁 Todo</h2>
  <div id="contenido" class="grid" data-index="0"></div>
</div>

<div class="social">
  <h3>Sígueme</h3>
  <a href="https://t.me/estrenos_online_25" target="_blank">Telegram</a>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxWfCboKOh6Gez4dDbP0BG7Wq8AZEV5fO3-YR3wUOrCNU-0ETH31DMM8D9_2KVVgIUb/exec";
const LOAD_STEP = 20;

// Normaliza texto
function normalizar(texto){
  return texto.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

// Parseo robusto de fecha
function parseFecha(fechaStr){
  if(!fechaStr) return null;
  fechaStr = fechaStr.toString().trim();
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(fechaStr)){
    return new Date(fechaStr);
  }
  // DD/MM/YYYY o DD-MM-YYYY
  let partes = fechaStr.split(/[\/\-]/);
  if(partes.length===3){
    let d=parseInt(partes[0],10);
    let m=parseInt(partes[1],10)-1;
    let y=parseInt(partes[2],10);
    return new Date(y,m,d);
  }
  const f = new Date(fechaStr);
  return isNaN(f)?null:f;
}

// Comprueba si la fecha es hoy
function esHoy(fechaStr){
  const fecha = parseFecha(fechaStr);
  if(!fecha) return false;
  const hoy = new Date();
  return fecha.getFullYear()===hoy.getFullYear() &&
         fecha.getMonth()===hoy.getMonth() &&
         fecha.getDate()===hoy.getDate();
}

// Abre contenido Telegram con fallback
function abrirContenido(link) {
  if(!link){
    window.open("https://t.me/estrenos_online_25","_blank");
    return;
  }
  const match = link.match(/\/(\d+)\/?$/);
  let postId = match ? match[1] : "";
  if(postId){
    window.location.href=`tg://resolve?domain=estrenos_online_25&post=${postId}`;
    setTimeout(()=>window.open(`https://t.me/estrenos_online_25/${postId}`,"_blank"),800);
  } else {
    window.open(link,"_blank");
  }
}

let dataGlobal = [];
async function cargarDatos(){
  try{
    const res = await fetch(API_URL,{cache:"no-store"});
    dataGlobal = await res.json();
    iniciar();
  }catch(e){
    document.body.innerHTML="<h2 style='text-align:center'>Error cargando contenido</h2>";
  }
}

function iniciar(){
  const secciones = {
    hoy: dataGlobal.filter(x => esHoy(x.published_at)),
    destacadas: dataGlobal.filter(x => normalizar(x.destacada) === "si"),
    peliculas: dataGlobal.filter(x => x.type==="movie"),
    series: dataGlobal.filter(x => x.type==="tv"),
    random: [...dataGlobal].sort((a,b)=>parseFloat(b.vote_average||0)-parseFloat(a.vote_average||0)),
    contenido: dataGlobal
  };

  for(const id in secciones){
    const grid = document.getElementById(id);
    grid.dataset.items = JSON.stringify(secciones[id]);
    grid.dataset.index = 0;
    grid.innerHTML = "";
    renderSeccion(id);
  }
}

function renderSeccion(id){
  const grid = document.getElementById(id);
  let items = JSON.parse(grid.dataset.items);
  let start = parseInt(grid.dataset.index);
  let end = Math.min(start+LOAD_STEP, items.length);
  const fragment = document.createDocumentFragment();

  for(let i=start;i<end;i++){
    const item = items[i];
    const titulo = item.title||"Sin título";
    const img = item.poster||"https://via.placeholder.com/300x450";
    const link = item.vip_post||"";
    const tipo = (item.tipo_contenido||"gratis").toLowerCase();
    const precio = item.precio_stars||0;

    const card = document.createElement("div");
    card.className="card";
    card.onclick=()=>abrirContenido(link);
    card.innerHTML=`
      <img src="${img}" loading="lazy">
      <div class="btn-ver">VER</div>
      <div class="overlay">${titulo}</div>
      <div class="badge ${tipo==='gratis'?'':'pago'}">${tipo==='gratis'?'Gratis':'💰 '+precio+'⭐'}</div>
    `;
    fragment.appendChild(card);
  }

  grid.appendChild(fragment);
  grid.dataset.index=end;
}

// Scroll infinito optimizado
window.addEventListener("scroll",()=>{
  const bottom = window.innerHeight+window.scrollY >= document.body.offsetHeight-150;
  if(bottom){
    document.querySelectorAll(".grid").forEach(g=>{
      const items = JSON.parse(g.dataset.items);
      const index = parseInt(g.dataset.index);
      if(index<items.length) renderSeccion(g.id);
    });
  }
});

// Buscador avanzado
function buscar(texto){
  if(!texto) return iniciar();
  const filtrado = dataGlobal.filter(x=>normalizar(x.title||"").includes(normalizar(texto)));
  const ids=["hoy","destacadas","peliculas","series","random","contenido"];
  ids.forEach(id=>{
    const grid=document.getElementById(id);
    grid.innerHTML="";
    grid.dataset.items=JSON.stringify(filtrado);
    grid.dataset.index=0;
    renderSeccion(id);
  });
}

cargarDatos();
</script>
</body>
</html>
