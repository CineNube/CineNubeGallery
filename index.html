<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Canal Premium</title>

<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:white;}
header {background:black;padding:15px;display:flex;justify-content:space-between;align-items:center;}
.logo {font-size:22px;font-weight:bold;color:red;cursor:pointer;}
.search {padding:8px;border-radius:5px;border:none;width:150px;}

.section {padding:20px;}
.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}

.card {position:relative;cursor:pointer;overflow:hidden;border-radius:10px;transition:.3s;}
.card:hover {transform:scale(1.08);}
.card img {width:100%;border-radius:10px;}

.overlay {
position:absolute;bottom:0;width:100%;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
padding:10px;font-size:12px;text-align:center;
}

.btn-ver {
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
background:red;padding:6px 12px;
font-weight:bold;border-radius:6px;
}

.badge {
position:absolute;top:10px;left:10px;
background:green;padding:3px 6px;
font-size:12px;border-radius:5px;
font-weight:bold;
}
.badge.pago {background:red;}

.vipGlow {
box-shadow:0 0 12px rgba(255,0,0,0.7);
}
</style>
</head>

<body>

<header>
<div class="logo" onclick="resetBusqueda()">🔥 Mi Canal</div>
<input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
</header>

<div class="section">
<p style="opacity:0.7;font-size:14px;">
🔥 Nuevo contenido cada día — algunos títulos requieren acceso VIP
</p>
</div>

<div class="section"><h2>🚀 Hoy</h2><div id="hoy" class="grid" data-index="0"></div></div>
<div class="section"><h2>🔥 Lo más visto</h2><div id="trending" class="grid" data-index="0"></div></div>
<div class="section"><h2>💎 Solo VIP</h2><div id="topventas" class="grid" data-index="0"></div></div>
<div class="section"><h2>⭐ Top calidad</h2><div id="destacadas" class="grid" data-index="0"></div></div>
<div class="section"><h2>🎬 Películas</h2><div id="peliculas" class="grid" data-index="0"></div></div>
<div class="section"><h2>📺 Series</h2><div id="series" class="grid" data-index="0"></div></div>

<!-- ocultas pero funcionando -->
<div style="display:none"><div id="random" class="grid"></div></div>
<div style="display:none"><div id="contenido" class="grid"></div></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxWfCboKOh6Gez4dDbP0BG7Wq8AZEV5fO3-YR3wUOrCNU-0ETH31DMM8D9_2KVVgIUb/exec?nocache="+Date.now();
const LOAD_STEP=20;

function normalizar(t){return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function parseFecha(f){ if(!f) return null; if(typeof f==="string" && f.includes("-")) return new Date(f+"T00:00:00"); let d=new Date(f); return isNaN(d)?null:d;}
function esHoy(f){let d=parseFecha(f);if(!d)return false;return d.toDateString()===new Date().toDateString();}

function abrirContenido(link,tipo,precio,pop){
if(tipo!=="gratis"){
let mensaje="🔒 CONTENIDO VIP\n\n";
if(pop>150) mensaje+="🔥 MUY DEMANDADO\n";
if(precio<=10) mensaje+="💸 PRECIO BAJO\n";
else if(precio<=25) mensaje+="⭐ RECOMENDADO\n";
else mensaje+="💎 PREMIUM\n";
mensaje+="\n⚡ Acceso en Telegram";
if(!confirm(mensaje)) return;
}
if(!link) return window.open("https://t.me/estrenos_online_25","_blank");
window.open(link,"_blank");
}

let dataGlobal=[];

async function cargarDatos(){
let res=await fetch(API_URL);
dataGlobal=await res.json();

// eliminar duplicados
dataGlobal=Object.values(dataGlobal.reduce((acc,item)=>{
acc[item.title]=item;return acc;
},{}));

iniciar();

// 🔥 actualización automática estilo plataforma
setInterval(actualizarDinamico, 300000); // cada 5 min
}

function getSecciones(data){

let usados = new Set();
function unicos(lista){
return lista.filter(x=>{
if(usados.has(x.title)) return false;
usados.add(x.title);
return true;
});
}

// HOY
let hoy = data.filter(x=>esHoy(x.published_at));
if(!hoy.length){
hoy = [...data].sort((a,b)=> new Date(b.published_at)-new Date(a.published_at)).slice(0,20);
}
hoy = unicos(hoy);

// TRENDING dinámico
let trending = unicos(
[...data]
.sort((a,b)=>(b.popularity||0)-(a.popularity||0))
.slice(0,50)
.sort(()=>0.5-Math.random())
);

// VIP (optimizado dinero + interés)
let topventas = unicos(
[...data]
.filter(x=>x.tipo_contenido!=="gratis")
.sort((a,b)=>{
let scoreA=(a.popularity||0)*0.7+(a.precio_stars||0)*0.3;
let scoreB=(b.popularity||0)*0.7+(b.precio_stars||0)*0.3;
return scoreB-scoreA;
})
);

// DESTACADAS
let destacadas = unicos(
data.filter(x=>x.destacada || x.vote_average>=7.5)
);

// PELÍCULAS / SERIES
let peliculas = unicos(data.filter(x=>x.type==="movie"));
let series = unicos(data.filter(x=>x.type==="tv"));

// ocultos pero útiles
let random = unicos([...data].sort(()=>0.5-Math.random()));
let contenido = data;

return {hoy,trending,topventas,destacadas,peliculas,series,random,contenido};
}

function renderSeccion(id){
let grid=document.getElementById(id);
let items=JSON.parse(grid.dataset.items || "[]");
let index=parseInt(grid.dataset.index || 0);
let end=Math.min(index+LOAD_STEP,items.length);

for(let i=index;i<end;i++){
let item=items[i];

let card=document.createElement("div");
card.className="card "+(item.tipo_contenido!=="gratis"?"vipGlow":"");
card.onclick=()=>abrirContenido(item.vip_post,item.tipo_contenido,item.precio_stars,item.popularity);

card.innerHTML=`
<img src="${item.poster||''}">
<div class="btn-ver">VER</div>
<div class="overlay">${item.title||''}</div>
<div class="badge ${item.tipo_contenido==='gratis'?'':'pago'}">
${item.tipo_contenido==='gratis'?'Gratis':'🔒 VIP · '+item.precio_stars+'⭐'}
</div>`;

grid.appendChild(card);
}

grid.dataset.index=end;
}

function iniciar(){
let sec=getSecciones(dataGlobal);
for(let id in sec){
let grid=document.getElementById(id);
if(!grid) continue;
grid.innerHTML="";
grid.dataset.items=JSON.stringify(sec[id]);
grid.dataset.index=0;
renderSeccion(id);
}
}

// 🔥 refresco automático solo de lo dinámico
function actualizarDinamico(){
let sec=getSecciones(dataGlobal);

["trending"].forEach(id=>{
let grid=document.getElementById(id);
if(!grid) return;
grid.innerHTML="";
grid.dataset.items=JSON.stringify(sec[id]);
grid.dataset.index=0;
renderSeccion(id);
});
}

function buscar(txt){
if(!txt) return iniciar();
let f=dataGlobal.filter(x=>normalizar(x.title).includes(normalizar(txt)));
let sec=getSecciones(f);

for(let id in sec){
let grid=document.getElementById(id);
if(!grid) continue;
grid.innerHTML="";
grid.dataset.items=JSON.stringify(sec[id]);
grid.dataset.index=0;
renderSeccion(id);
}
}

function resetBusqueda(){
document.querySelector(".search").value="";
iniciar();
}

window.addEventListener("scroll",()=>{
if(window.innerHeight+window.scrollY>=document.body.offsetHeight-100){
document.querySelectorAll(".grid").forEach(g=>{
let items=JSON.parse(g.dataset.items || "[]");
let index=parseInt(g.dataset.index || 0);
if(index<items.length) renderSeccion(g.id);
});
}
});

cargarDatos();
</script>
</body>
</html>
